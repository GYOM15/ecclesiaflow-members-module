# =============================================================================
# Test configuration — overrides for H2 in-memory database
# =============================================================================

# H2 embedded database (replaces MySQL for tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 dialect (overrides MySQL from .env)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Keycloak OAuth2 for tests
spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=

# Disable gRPC for tests
grpc.enabled=false

# Scope validation disabled for tests
ecclesiaflow.scopes.enabled=false

# Auth module base URL for mapper tests
auth.module.base-url=http://localhost:8081
