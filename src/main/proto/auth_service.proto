syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.ecclesiaflow.grpc.auth";
option java_outer_classname = "AuthServiceProto";

package ecclesiaflow.auth;

service AuthService {
  rpc GenerateTemporaryToken(TemporaryTokenRequest) returns (TemporaryTokenResponse);
  rpc DeleteKeycloakUser(DeleteKeycloakUserRequest) returns (DeleteKeycloakUserResponse);
  rpc DisableKeycloakUser(DisableKeycloakUserRequest) returns (DisableKeycloakUserResponse);
  rpc UpdateKeycloakUserEmail(UpdateKeycloakUserEmailRequest) returns (UpdateKeycloakUserEmailResponse);
}

message TemporaryTokenRequest {
  string email = 1;
  string member_id = 2;
}

message TemporaryTokenResponse {
  string temporary_token = 1;
  int32 expires_in_seconds = 2;
  string password_endpoint = 3;
}

message DeleteKeycloakUserRequest {
  string keycloak_user_id = 1;
}

message DeleteKeycloakUserResponse {
  bool success = 1;
  string message = 2;
}

message DisableKeycloakUserRequest {
  string keycloak_user_id = 1;
}

message DisableKeycloakUserResponse {
  bool success = 1;
  string message = 2;
}

message UpdateKeycloakUserEmailRequest {
  string keycloak_user_id = 1;
  string new_email = 2;
}

message UpdateKeycloakUserEmailResponse {
  bool success = 1;
  string message = 2;
}
