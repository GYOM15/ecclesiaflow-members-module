# ============================================================================
# ECCLESIAFLOW MEMBERS MODULE - DEVELOPMENT PROFILE
# ============================================================================
# Local development configuration with MySQL
# ============================================================================

# ============================================================================
# JPA/HIBERNATE CONFIGURATION
# ============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ============================================================================
# MAIL CONFIGURATION
# ============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Alternative: MailHog for local email testing
# Uncomment these lines and comment Gmail config above to use MailHog
# spring.mail.host=localhost
# spring.mail.port=1025
# spring.mail.properties.mail.smtp.auth=false
# spring.mail.properties.mail.smtp.starttls.enable=false

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
logging.level.root=INFO
logging.level.com.ecclesiaflow.business=DEBUG
logging.level.com.ecclesiaflow.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.mail=DEBUG

# ============================================================================
# SPRINGDOC CONFIGURATION
# ============================================================================
springdoc.cache.disabled=true

# ============================================================================
# ACTUATOR CONFIGURATION
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
