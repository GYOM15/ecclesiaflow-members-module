# ============================================================================
# ECCLESIAFLOW MEMBERS MODULE - BASE CONFIGURATION
# ============================================================================
# This file contains common configuration for all environments.
# Environment-specific settings are in application-{profile}.properties
# Secrets are loaded from environment variables (never hardcoded)
# ============================================================================

# ============================================================================
# APPLICATION INFO
# ============================================================================
spring.application.name=ecclesiaflow-members-module
server.port=8080

# ============================================================================
# DATABASE CONFIGURATION
# ============================================================================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}

# JPA/Hibernate - Common settings (ddl-auto is profile-specific)
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT}
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}

# ============================================================================
# KEYCLOAK OAUTH2 CONFIGURATION
# ============================================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI}

# ============================================================================
# EXTERNAL SERVICES
# ============================================================================
ecclesiaflow.auth.module.base-url=${AUTH_MODULE_BASE_URL}

# ============================================================================
# gRPC CONFIGURATION
# ============================================================================
grpc.enabled=${GRPC_ENABLED}

# gRPC Server
grpc.server.port=${GRPC_SERVER_PORT}
grpc.server.shutdown-timeout-seconds=${GRPC_SERVER_SHUTDOWN_TIMEOUT}

# gRPC Clients
grpc.auth.host=${GRPC_AUTH_HOST}
grpc.auth.port=${GRPC_AUTH_PORT}
grpc.client.shutdown-timeout-seconds=${GRPC_CLIENT_SHUTDOWN_TIMEOUT}

# ============================================================================
# FRONTEND CONFIGURATION
# ============================================================================
ecclesiaflow.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# ============================================================================
# CORS CONFIGURATION
# ============================================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173}

# ============================================================================
# SCOPE VALIDATION
# ============================================================================
# Set to false in dev when Keycloak custom scopes (ef:members:*) are not
# configured as JWT claims. In production, set to true.
ecclesiaflow.scopes.enabled=${ECCLESIAFLOW_SCOPES_ENABLED:true}

# ============================================================================
# ACTUATOR CONFIGURATION (Kubernetes-ready)
# ============================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ============================================================================
# RESILIENCE4J CONFIGURATION
# ============================================================================
# Circuit Breaker for Email Service
resilience4j.circuitbreaker.instances.emailService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.emailService.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.emailService.slow-call-duration-threshold=5s
resilience4j.circuitbreaker.instances.emailService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.emailService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.emailService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.emailService.sliding-window-size=10
resilience4j.circuitbreaker.instances.emailService.minimum-number-of-calls=5

# Retry for Email Service
resilience4j.retry.instances.emailServiceRetry.max-attempts=3
resilience4j.retry.instances.emailServiceRetry.wait-duration=500ms

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
# Root logging level
logging.level.root=INFO

# Application packages - DEBUG level for detailed troubleshooting
logging.level.com.ecclesiaflow=DEBUG

# Spring Security - INFO level (set to DEBUG if needed for auth troubleshooting)
logging.level.org.springframework.security=INFO

# Hibernate SQL - controlled by spring.jpa.show-sql
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

