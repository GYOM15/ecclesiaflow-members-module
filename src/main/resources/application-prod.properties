# ============================================================================
# ECCLESIAFLOW MEMBERS MODULE - PRODUCTION OVERRIDES
# ============================================================================
# Activate with: SPRING_PROFILES_ACTIVE=prod
# Only contains settings that differ from the base application.properties.
# ============================================================================

# ============================================================================
# JPA / HIBERNATE
# ============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================================
# LOGGING
# ============================================================================
logging.level.root=INFO
logging.level.com.ecclesiaflow=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================================================
# SPRINGDOC
# ============================================================================
springdoc.cache.disabled=false

# ============================================================================
# ACTUATOR (Kubernetes probes)
# ============================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ============================================================================
# ERROR HANDLING
# ============================================================================
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
