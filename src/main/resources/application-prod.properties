# ============================================================================
# ECCLESIAFLOW MEMBERS MODULE - PRODUCTION PROFILE
# ============================================================================
# Production configuration for Kubernetes deployment
# ============================================================================

# ============================================================================
# JPA/HIBERNATE CONFIGURATION
# ============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Connection pool optimization
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================================
# MAIL CONFIGURATION (Production SMTP)
# ============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# For AWS SES, SendGrid, or other providers, update host/port accordingly
# spring.mail.host=email-smtp.us-east-1.amazonaws.com
# spring.mail.port=587

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
logging.level.root=INFO
logging.level.com.ecclesiaflow=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Log to stdout for container environments
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================================================
# SPRINGDOC CONFIGURATION
# ============================================================================
springdoc.cache.disabled=false

# ============================================================================
# ACTUATOR CONFIGURATION (Kubernetes-ready)
# ============================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ============================================================================
# ERROR HANDLING (Production hardening)
# ============================================================================
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
