name: EcclesiaFlow Members Module CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn verify -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecclesiaflow-members-module:latest
            ghcr.io/${{ github.repository_owner }}/ecclesiaflow-members-module:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
          script: |
            set -e
            cd /opt/ecclesiaflow/ecclesiaflow-deploy

            # Pull latest image from GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/ecclesiaflow-members-module:latest

            # Tag for local compose
            docker tag ghcr.io/${{ github.repository_owner }}/ecclesiaflow-members-module:latest ecclesiaflow/members-module:latest

            # Restart only members service
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps --no-build members-module

            # Cleanup old images
            docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
          script: |
            echo "Waiting for members module to be ready..."
            for i in $(seq 1 30); do
              if docker compose -f /opt/ecclesiaflow/ecclesiaflow-deploy/docker-compose.prod.yml --env-file /opt/ecclesiaflow/ecclesiaflow-deploy/.env.prod ps members-module | grep -q "healthy"; then
                echo "Members module is healthy!"
                exit 0
              fi
              echo "Attempt $i/30 — waiting 10s..."
              sleep 10
            done
            echo "ERROR: Members module did not become healthy within 5 minutes"
            docker compose -f /opt/ecclesiaflow/ecclesiaflow-deploy/docker-compose.prod.yml --env-file /opt/ecclesiaflow/ecclesiaflow-deploy/.env.prod logs --tail=50 members-module
            exit 1
